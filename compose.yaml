services:
###> doctrine/doctrine-bundle ###
    database:
        image: 'mysql:latest'
        ports:
            - '3306:3306'
        environment:
            MYSQL_USER: app
            MYSQL_PASSWORD: app
            MYSQL_DATABASE: app
            MYSQL_ROOT_PASSWORD: app
        volumes:
            - './docker/mysql/data:/var/lib/mysql'
